name: Update GitHub stats

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

jobs:
  stats:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Generate stats
        # Pinned to a commit SHA (not the @v2 tag) since this action
        # receives an org-scoped token as input.
        uses: stats-organization/github-readme-stats-action@f9d8133845f40d659a754f78b8484983ba766448
        with:
          card: stats
          options: ${{ secrets.STATS_OPTIONS }}
          path: profile/stats.svg
          token: ${{ secrets.STATS_PAT }}

      - name: Commit stats
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add profile/stats.svg
          git commit -m "Update GitHub stats" || exit 0
          git push
