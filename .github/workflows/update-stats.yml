name: Update GitHub stats

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

jobs:
  stats:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Generate stats
        # Pinned to a commit SHA (not the @v2 tag) since this action
        # receives an org-scoped token as input.
        uses: stats-organization/github-readme-stats-action@f9d8133845f40d659a754f78b8484983ba766448
        with:
          card: stats
          options: ${{ secrets.STATS_OPTIONS }}
          path: profile/stats.svg
          token: ${{ secrets.STATS_PAT }}

      # PREVIEW MODE: uploads the card as a downloadable artifact instead
      # of committing it, so it can be checked (incl. for any visible
      # org/repo name in the rendered card) before it ever reaches main.
      # Once verified, swap this step back to a direct commit+push.
      - name: Upload stats as artifact (preview)
        uses: actions/upload-artifact@v4
        with:
          name: stats-preview
          path: profile/stats.svg
          retention-days: 7
